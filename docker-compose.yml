version: '3.8'

services:
  lm-piot-monitor:
    build: .
    container_name: lm-piot-monitor
    ports:
      - "5000:5000"
    volumes:
      - ./instance:/app/instance
    environment:
      - TZ=Europe/Moscow
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"